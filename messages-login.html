<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Müşteri Mesajları | Giriş</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #ffd166;
      --primary-dark: #ffb703;
      --bg-dark: #121212;
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
      --text-primary: #ffffff;
      --text-sec: rgba(255, 255, 255, 0.6);
      --input-bg: rgba(255, 255, 255, 0.05);
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-dark);
      background-image: 
        radial-gradient(circle at 15% 50%, rgba(255, 209, 102, 0.15), transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(255, 183, 3, 0.1), transparent 25%);
      color: var(--text-primary);
      overflow: hidden;
    }

    .login-wrapper {
      width: 100%;
      max-width: 420px;
      padding: 40px;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      text-align: center;
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .brand-icon {
      width: 60px; height: 60px;
      margin: 0 auto 20px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      box-shadow: 0 10px 20px rgba(255, 209, 102, 0.3);
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    p {
      font-size: 14px;
      color: var(--text-sec);
      margin-bottom: 30px;
    }

    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }

    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-sec);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-input {
      width: 100%;
      padding: 14px 16px;
      background: var(--input-bg);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      color: white;
      font-size: 14px;
      font-family: inherit;
      transition: all 0.3s ease;
      outline: none;
    }

    .form-input:focus {
      border-color: var(--primary);
      background: rgba(255, 209, 102, 0.05);
      box-shadow: 0 0 0 3px rgba(255, 209, 102, 0.2);
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #ffffff;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
      box-shadow: 0 8px 20px rgba(255, 209, 102, 0.3);
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(255, 209, 102, 0.4);
    }
  </style>
</head>
<body>

  <div class="login-wrapper">
    <div class="brand-icon">💬</div>
    <h1>Müşteri Mesajları</h1>
    <p>Gelen talepleri yönetmek için giriş yapın.</p>

    <form onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label">Kullanıcı Adı</label>
        <input type="text" class="form-input" id="username" placeholder="Kullanıcı adınızı girin" required />
      </div>
      <div class="form-group">
        <label class="form-label">Şifre</label>
        <input type="password" class="form-input" id="password" placeholder="Şifrenizi girin" required />
      </div>
      <button type="submit" class="btn-login">Giriş Yap</button>
    </form>
  </div>

  <script>
    function handleLogin(e) {
      e.preventDefault();
      // Basit bir yönlendirme şimdilik
      window.location.href = 'messages-dashboard.html';
    }
  </script>
</body>
</html>
