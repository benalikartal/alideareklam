<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Müşteri Mesajları Paneli</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f13;
      --glass: rgba(255, 255, 255, 0.03);
      --border: rgba(255, 255, 255, 0.08);
      --text: #ffffff;
      --text-muted: #888893;
      --accent: #ffd166;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    .sidebar {
      width: 260px;
      background: var(--glass);
      border-right: 1px solid var(--border);
      padding: 24px;
      display: flex;
      flex-direction: column;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 40px;
    }

    .brand-icon {
      background: var(--accent);
      color: #000;
      width: 32px; height: 32px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }

    .nav-item {
      padding: 12px 16px;
      border-radius: 12px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .nav-item.active {
      background: rgba(255, 209, 102, 0.1);
      color: var(--accent);
    }

    .nav-item:hover:not(.active) {
      background: var(--glass);
      color: var(--text);
    }

    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      height: 70px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 32px;
      justify-content: space-between;
    }

    .content {
      flex: 1;
      padding: 32px;
      overflow-y: auto;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
      color: var(--text-muted);
      animation: fadeIn 0.5s ease;
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 20px;
      opacity: 0.5;
    }

    .empty-title {
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
    }

    /* Message UI */
    .messages-container {
      display: none; /* Shown via JS */
      height: 100%;
      gap: 24px;
    }

    .message-list {
      width: 360px;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .message-item {
      padding: 20px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.2s;
    }

    .message-item:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .message-item.active {
      background: rgba(255, 209, 102, 0.08);
      border-left: 3px solid var(--accent);
    }

    .msg-header {
      display: flex; justify-content: space-between; margin-bottom: 8px;
    }

    .msg-category { 
      font-size: 11px; color: #000; font-weight: 700; background: var(--accent);
      padding: 3px 8px; border-radius: 6px; text-transform: uppercase; letter-spacing: 0.5px;
    }

    .msg-date { font-size: 12px; color: var(--text-muted); }

    .msg-email { font-size: 15px; font-weight: 600; margin-bottom: 6px; color: var(--text); }

    .msg-preview { 
      font-size: 13px; color: var(--text-muted); 
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
      line-height: 1.5;
    }

    .message-detail {
      flex: 1;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px;
      display: none;
      flex-direction: column;
      overflow-y: auto;
    }

    .message-detail.active {
      display: flex;
      animation: fadeIn 0.4s ease;
    }

    .det-header {
      border-bottom: 1px solid var(--border);
      padding-bottom: 24px;
      margin-bottom: 24px;
    }

    .det-title { font-size: 26px; font-weight: 700; margin-bottom: 16px; }

    .det-meta { display: flex; flex-wrap: wrap; gap: 20px; font-size: 14px; color: var(--text-muted); }
    .det-meta span { display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.2); padding: 8px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); }

    .det-body {
      font-size: 16px; line-height: 1.8; color: #e2e2e2;
      background: rgba(0,0,0,0.15); padding: 24px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.03);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
  
    /* MOBILE RESPONSIVE CSS */
    .mobile-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 998;
      backdrop-filter: blur(4px);
    }
    .hamburger {
      display: none;
      background: none;
      border: none;
      color: var(--text);
      font-size: 24px;
      cursor: pointer;
      margin-right: 16px;
    }
    @media (max-width: 900px) {
      .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        z-index: 999;
        transform: translateX(-100%);
        transition: transform 0.3s ease;
      }
      .sidebar.open {
        transform: translateX(0);
      }
      .mobile-overlay.active {
        display: block;
      }
      .hamburger {
        display: block;
      }
      .grid {
        grid-template-columns: 1fr !important;
      }
      .stats-grid, .panels-grid, .content-grid, .overview-cards, .dashboard-grid {
        grid-template-columns: 1fr !important;
      }
      .topbar {
        padding: 0 16px;
      }
      .content-area, .content {
        padding: 16px;
      }
      .main-content {
        width: 100%;
        max-width: 100vw;
      }
      /* Chat layout specific for messages */
      .chat-layout {
        grid-template-columns: 1fr !important;
      }
      .chat-list {
        display: block; /* Could hide one or the other, but stacking is safer for now */
      }
    }
  </style>

</head>
<body>
  <div class="mobile-overlay" id="mobileOverlay" onclick="closeSidebar()"></div>

  <aside class="sidebar">
    <div class="brand">
      <div class="brand-icon">💬</div>
      Mesaj Merkezi
    </div>
    
    <div class="nav-item active">
      <span>📥</span>
      <span style="flex:1">Gelen Kutusu</span>
      <span id="msgCountBadge" style="background:var(--accent);color:#000;font-size:11px;font-weight:700;padding:2px 6px;border-radius:10px;display:none;">0</span>
    </div>
    <div class="nav-item" onclick="window.location.href='admin-dashboard.html'">
      <span>🔙</span>
      Ana Panele Dön
    </div>
  </aside>

  <main class="main-content">
    <header class="topbar">
        <button class="hamburger" onclick="openSidebar()">☰</button>
      <h2>Gelen Kutusu</h2>
      <div style="color: var(--text-muted)">Hoş geldin, Yönetici</div>
    </header>

    <div class="content">
      
      <!-- Boş Durum -->
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">📭</div>
        <div class="empty-title">Henüz Mesaj Yok</div>
        <p>Sitenin ön yüzünden gönderilen yeni talepler burada listelenecektir.</p>
      </div>

      <!-- Mesajlar Arayüzü -->
      <div class="messages-container" id="messagesContainer">
        <!-- Sol Liste -->
        <div class="message-list" id="messageList"></div>

        <!-- Sağ Detay -->
        <div class="message-detail" id="messageDetail"></div>
      </div>

    </div>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      loadMessages();
      
      // Dinamik olarak her sekme aktif edildiğinde (eğer ileride yeni sekmeler eklenirse) mesajları güncelle
      window.addEventListener('storage', (e) => {
        if(e.key === 'alidea_leads') loadMessages();
      });
    });

    function loadMessages() {
      const leads = JSON.parse(localStorage.getItem('alidea_leads')) || [];
      const listEl = document.getElementById('messageList');
      const emptyEl = document.getElementById('emptyState');
      const containerEl = document.getElementById('messagesContainer');
      const badgeEl = document.getElementById('msgCountBadge');

      listEl.innerHTML = '';

      if (leads.length === 0) {
        emptyEl.style.display = 'flex';
        containerEl.style.display = 'none';
        badgeEl.style.display = 'none';
        return;
      }

      emptyEl.style.display = 'none';
      containerEl.style.display = 'flex';
      
      badgeEl.textContent = leads.length;
      badgeEl.style.display = 'block';

      // Yeniden eskiye sırala
      leads.sort((a, b) => b.id - a.id).forEach(lead => {
        const item = document.createElement('div');
        item.className = 'message-item';
        
        // Güvenli HTML için escape (Temel koruma)
        const safeEmail = escapeHtml(lead.email);
        const safeMessage = escapeHtml(lead.message);
        const safeCategory = escapeHtml(lead.category || 'Genel Talep');
        const safeDate = escapeHtml(lead.date || '');

        item.innerHTML = `
          <div class="msg-header">
            <span class="msg-category">${safeCategory}</span>
            <span class="msg-date">${safeDate}</span>
          </div>
          <div class="msg-email">${safeEmail}</div>
          <div class="msg-preview">${safeMessage}</div>
        `;
        
        item.addEventListener('click', () => {
          document.querySelectorAll('.message-item').forEach(i => i.classList.remove('active'));
          item.classList.add('active');
          showDetail(lead);
        });
        
        listEl.appendChild(item);
      });

      // İlk mesajı otomatik seç
      if(listEl.firstChild) {
        listEl.firstChild.click();
      }
    }

    function showDetail(lead) {
      const detailEl = document.getElementById('messageDetail');
      detailEl.classList.add('active');
      
      const safeEmail = escapeHtml(lead.email);
      const safePhone = escapeHtml(lead.phone);
      const safeMessage = escapeHtml(lead.message).replace(/\n/g, '<br>');
      const safeCategory = escapeHtml(lead.category || 'Genel Talep');
      const safeDate = escapeHtml(lead.date || '');

      detailEl.innerHTML = `
        <div class="det-header">
          <div class="det-title">${safeCategory}</div>
          <div class="det-meta">
            <span>📧 <a href="mailto:${safeEmail}" style="color:var(--text);text-decoration:none;">${safeEmail}</a></span>
            <span>📱 <a href="tel:${safePhone}" style="color:var(--text);text-decoration:none;">${safePhone}</a></span>
            <span>🕒 ${safeDate}</span>
          </div>
        </div>
        <div class="det-body">
          ${safeMessage}
        </div>
        <div style="margin-top: 40px; display: flex; gap: 12px; align-items:center;">
          <a href="mailto:${safeEmail}" style="padding: 12px 24px; background: var(--accent); color: #000; text-decoration: none; border-radius: 10px; font-weight: 600; transition: transform 0.2s;">📧 E-posta Yanıtla</a>
          
          <a href="https://wa.me/${safePhone.replace(/\D/g,'')}" target="_blank" style="padding: 12px 24px; background: #25D366; color: #fff; text-decoration: none; border-radius: 10px; font-weight: 600; transition: transform 0.2s;">💬 WhatsApp'tan Yaz</a>
          
          <button onclick="deleteMessage(${lead.id})" style="padding: 12px 24px; background: rgba(255,77,109,0.1); color: #ff4d6d; border: 1px solid rgba(255,77,109,0.3); border-radius: 10px; cursor:pointer; font-weight: 600; margin-left: auto; transition: all 0.2s;">🗑️ Mesajı Sil</button>
        </div>
      `;
    }

    function deleteMessage(id) {
      if(!confirm('Bu talebi silmek istediğinize emin misiniz? Bu işlem geri alınamaz.')) return;
      let leads = JSON.parse(localStorage.getItem('alidea_leads')) || [];
      leads = leads.filter(l => l.id !== id);
      localStorage.setItem('alidea_leads', JSON.stringify(leads));
      loadMessages();
      
      // Eğer mesaj kalmadıysa detayı gizle
      if (leads.length === 0) {
        document.getElementById('messageDetail').classList.remove('active');
      }
    }

    function escapeHtml(unsafe) {
      if(!unsafe) return '';
      return unsafe
           .replace(/&/g, "&amp;")
           .replace(/</g, "&lt;")
           .replace(/>/g, "&gt;")
           .replace(/"/g, "&quot;")
           .replace(/'/g, "&#039;");
    }
  
    function openSidebar() {
      const sb = document.querySelector('.sidebar');
      const mo = document.getElementById('mobileOverlay');
      if (sb) sb.classList.add('open');
      if (mo) mo.classList.add('active');
    }
    function closeSidebar() {
      const sb = document.querySelector('.sidebar');
      const mo = document.getElementById('mobileOverlay');
      if (sb) sb.classList.remove('open');
      if (mo) mo.classList.remove('active');
    }
  </script>

</body>
</html>
